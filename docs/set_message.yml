---
post:
  summary: Set a message
  description: API to set a message
  parameters:
    - name: body
      in: body
      required: true
      schema:
        type: object
        properties:
          id:
            type: integer
            example: 1
          timestamp:
            type: string
            example: "2023-06-01T12:34:56"
          eventname:
            type: string
            example: "Test Event"
          camera_number:
            type: integer
            example: 1
  responses:
    200:
      description: Message received successfully
    400:
      description: Bad request
